spring:
  datasource:
    url: jdbc:mysql://localhost:3306/avaliafit
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

jwt:
  secret: avaliafit-secret-key-2026-super-segura-aqui
  expiration: 86400000