<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalia FIT - Acesso ao Sistema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 h-screen flex items-center justify-center relative">

<img src="img/avaliafitbackground.png" alt="Background" class="absolute inset-0 w-full h-full object-cover opacity-10">
<div class="absolute inset-0 bg-gray-950/80"></div>

<main class="relative z-10 w-full max-w-md px-4">
    <form id="loginForm" class="bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
        <img src="img/logoavaliafit.png" alt="Avalia FIT Logo" class="mx-auto mb-8 w-40 h-auto">

        <div class="mb-5">
            <label for="email" class="block text-gray-300 font-semibold mb-2">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required
                   class="w-full px-4 py-3 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
        </div>

        <div class="mb-8">
            <label for="password" class="block text-gray-300 font-semibold mb-2">Senha</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required
                   class="w-full px-4 py-3 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition">
        </div>

        <button type="submit"
                class="w-full bg-green-500 hover:bg-green-400 text-gray-950 font-bold py-3 px-4 rounded-lg transition shadow-lg shadow-green-500/20">
            Acessar Painel
        </button>

        <p class="text-center mt-6 text-sm text-gray-400">
            Ainda não fez sua avaliação?
            <a href="index.html#contact" class="text-green-500 hover:text-green-400 font-bold transition">Agende agora</a>
        </p>
    </form>
</main>

<script type="module">
    import { CONFIG } from './js/config.js';
    import { StorageManager } from './js/storage-manager.js';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(CONFIG.API_BASE_URL + CONFIG.ENDPOINTS.AUTH_LOGIN, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha: password })
            });

            // SÓ EXISTE UM BLOCO IF AGORA!
            if (response.ok) {
                const data = await response.json();

                // 1. A NOVA BARREIRA DE SEGURANÇA
                const hostAtual = window.location.hostname;
                const isLocal = hostAtual === 'localhost' || hostAtual === '127.0.0.1';
                const isAdmin = data.role === 'ROLE_ADMIN' || data.role === 'ADMIN';

                // Se for Admin e NÃO estiver no servidor local, bloqueia imediatamente!
                if (isAdmin && !isLocal) {
                    alert('Acesso negado: Administradores só podem fazer login a partir do servidor físico.');
                    return; // Interrompe o código aqui, a pessoa não vai para lugar nenhum
                }

                // 2. Se for Paciente (ou se for Admin no PC certo), o fluxo continua normal
                StorageManager.saveLoginData(data.token, data.role, data.id, data.nome);
                window.location.href = '/inicial.html';
            } else {
                alert('E-mail ou senha inválidos.');
            }
        } catch (error) {
            console.error('Erro no login:', error);
            alert('Não foi possível conectar ao servidor.');
        }
    });
</script>
</body>
</html>
