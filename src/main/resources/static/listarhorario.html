<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Lista de Horários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col">

<header class="bg-gray-900 border-b-4 border-blue-600 sticky top-0 z-50 p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="img/logoavaliafit.png" alt="Avalia FIT Logo" class="w-28 h-auto grayscale brightness-200">
            <span class="bg-blue-600/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide border border-blue-600/30">
                Área Restrita
            </span>
        </div>
        <nav class="hidden md:flex items-center gap-6 text-gray-300">
            <a href="inicial.html" class="hover:text-white transition font-medium">Dashboard</a>
            <a href="gerenciarhorarios.html" class="hover:text-white transition font-medium">Criar Horários</a>
            <a href="cadastro.html" class="hover:text-white transition font-medium">Novo Cadastro</a>
            <a href="listarusuarios.html" class="hover:text-white transition font-medium">Lista de Usuários</a>
            <a href="#" id="btnSair" class="text-red-400 hover:text-red-300 transition font-medium text-sm ml-4">Sair do Painel</a>
        </nav>
    </div>
</header>

<main class="flex-grow p-6 md:p-12">
    <div class="max-w-6xl mx-auto bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">

        <div class="mb-8 pb-4 border-b border-gray-800 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Gerenciamento de Horários</h1>
                <p class="text-gray-400 mt-1">Visualize, filtre e gerencie a disponibilidade de horários da clínica.</p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">
                <label for="filtroData" class="text-sm font-semibold text-gray-400 whitespace-nowrap">Data da Agenda:</label>
                <input type="date" id="filtroData" class="px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
        </div>

        <div class="overflow-x-auto bg-gray-950 rounded-lg border border-gray-800">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="border-b border-gray-800 bg-gray-800/80">
                    <th class="p-4 font-bold text-gray-300">Profissional</th>
                    <th class="p-4 font-bold text-gray-300">Data</th>
                    <th class="p-4 font-bold text-gray-300">Horário</th>
                    <th class="p-4 font-bold text-gray-300">Status</th>
                    <th class="p-4 font-bold text-gray-300 text-center">Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-horarios">
                </tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { StorageManager } from './js/storage-manager.js';
    import { apiClient } from './js/api-client.js';
    import { CONFIG } from './js/config.js';

    // 1. Defesa de Rota
    StorageManager.requireAuth();
    const role = StorageManager.getRole();
    if (role === 'ROLE_PACIENTE') {
        alert('Acesso Negado: Área restrita para funcionários.');
        window.location.href = '/inicial.html';
    }

    // 2. Logout
    document.getElementById('btnSair').addEventListener('click', (e) => {
        e.preventDefault();
        StorageManager.logout();
    });

    // 3. Inicializar campo de data com hoje
    const campoFiltroData = document.getElementById('filtroData');
    const hoje = new Date().toISOString().split('T')[0];
    campoFiltroData.value = hoje;

    campoFiltroData.addEventListener('change', () => {
        buscarAgendaDoDia(campoFiltroData.value);
    });

    // 4. Buscar e renderizar horários
    async function buscarAgendaDoDia(dataString) {
        const tabela = document.getElementById('tabela-horarios');
        tabela.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500 animate-pulse">Buscando horários da agenda...</td></tr>`;

        try {
            const horarios = await apiClient.get(CONFIG.ENDPOINTS.HORARIOS_DISPONIVEIS(dataString));

            tabela.innerHTML = '';

            if (!horarios || horarios.length === 0) {
                tabela.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">Nenhum horário aberto para esta data.</td></tr>`;
                return;
            }

            horarios.forEach(item => {
                const dataFormatada    = dataString.split('-').reverse().join('/');
                const horarioFormatado = item.horario.substring(0, 5);

                const statusBadge = item.disponivel
                    ? `<span class="bg-green-500/20 text-green-400 text-xs font-bold px-2.5 py-1 rounded-full border border-green-500/30">Livre</span>`
                    : `<span class="bg-red-500/20 text-red-400 text-xs font-bold px-2.5 py-1 rounded-full border border-red-500/30">Ocupado</span>`;

                const linha = document.createElement('tr');
                linha.className = "border-b border-gray-800 hover:bg-gray-900/50 transition text-sm";
                linha.innerHTML = `
                    <td class="p-4 font-medium text-white">${item.funcionario.usuario.nome}</td>
                    <td class="p-4 text-gray-400">${dataFormatada}</td>
                    <td class="p-4 text-gray-300 font-mono font-semibold">${horarioFormatado}</td>
                    <td class="p-4">${statusBadge}</td>
                    <td class="p-4 text-center">
                        <button onclick="prepararEdicao(${item.idHorario}, '${dataString}', '${item.horario}', ${item.funcionario.idFuncionario})"
                                class="text-blue-400 hover:text-blue-300 font-medium transition mr-4">
                            Editar
                        </button>
                        <button onclick="cancelarHorario(${item.idHorario})"
                                class="text-red-400 hover:text-red-300 transition font-medium">
                            Remover
                        </button>
                    </td>
                `;
                tabela.appendChild(linha);
            });

        } catch (error) {
            console.error('Erro ao ler a agenda do dia:', error);
            tabela.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400">Não foi possível carregar os horários desta data.</td></tr>`;
        }
    }

    // Exposição das funções de ação para os botões inline
    window.prepararEdicao = function(idHorario, data, horario, idFuncionario) {
        const params = new URLSearchParams({ id: idHorario, data, horario, idFuncionario });
        window.location.href = `/editarhorario.html?${params.toString()}`;
    };

    window.cancelarHorario = async function(idHorario) {
        if(confirm('Tem certeza de que deseja remover permanentemente este horário da agenda?')) {
            try {

                await apiClient.delete(`/horarios/${idHorario}`);

                alert('Horário removido com sucesso!');
                // Recarrega a tabela para o item sumir da tela
                buscarAgendaDoDia(document.getElementById('filtroData').value);
            } catch (error) {
                alert('Erro ao excluir: ' + error.message);
            }
        }
    };

    // Carrega a agenda do dia ao iniciar
    buscarAgendaDoDia(hoje);
</script>
</body>
</html>
