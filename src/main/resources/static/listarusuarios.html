<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Lista de Usuários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col">

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token) {
        window.location.href = '/login.html';
    }
    // Impede que Pacientes acessem a tela de listagem
    if (role === 'ROLE_PACIENTE') {
        alert('Acesso Negado: Área restrita para funcionários.');
        window.location.href = '/inicial.html';
    }
</script>

<header class="bg-gray-900 border-b-4 border-blue-600 sticky top-0 z-50 p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="img/logoavaliafit.png" alt="Avalia FIT Logo" class="w-28 h-auto grayscale brightness-200">
            <span class="bg-blue-600/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide border border-blue-600/30">
                    Área Restrita
                </span>
        </div>
        <nav class="hidden md:flex items-center gap-6 text-gray-300">
            <a href="#" class="hover:text-white transition font-medium">Pacientes</a>
            <a href="#" class="hover:text-white transition font-medium">Agenda</a>
            <a href="cadastro.html" class="hover:text-white transition font-medium">Novo Cadastro</a>
            <a href="listarusuarios.html" class="text-blue-400 font-bold border-b-2 border-blue-500 pb-1">Lista de Usuários</a>
            <a href="login.html" class="text-red-400 hover:text-red-300 transition font-medium text-sm ml-4">Sair do Painel</a>
        </nav>
    </div>
</header>

<main class="flex-grow p-6 md:p-12">
    <div class="max-w-6xl mx-auto bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">

        <div class="mb-8 pb-4 border-b border-gray-800 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-white">Gerenciamento de Usuários</h1>
                <p class="text-gray-400 mt-1">Visualize e gerencie os acessos ao sistema Avalia FIT.</p>
            </div>
            <a href="cadastro.html" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition shadow-lg shadow-blue-600/20">
                + Novo Usuário
            </a>
        </div>

        <div class="overflow-x-auto bg-gray-950 rounded-lg border border-gray-800">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="border-b border-gray-800 bg-gray-800/80">
                    <th class="p-4 font-bold text-gray-300">Nome</th>
                    <th class="p-4 font-bold text-gray-300">E-mail</th>
                    <th class="p-4 font-bold text-gray-300">Nível de Acesso</th>
                    <th class="p-4 font-bold text-gray-300 text-center">Ações</th>
                </tr>
                </thead>
                <tbody id="tabela-usuarios">
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    async function carregarUsuarios() {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        // Lógica Central: Define a URL baseada no cargo!
        let urlAPI = 'http://localhost:8080/usuarios';
        if (role === 'ROLE_FUNCIONARIO') {
            urlAPI = 'http://localhost:8080/usuarios/pacientes'; // Nutricionista só vê pacientes
        }

        try {
            const response = await fetch(urlAPI, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const usuarios = await response.json();
                const tbody = document.getElementById('tabela-usuarios');
                tbody.innerHTML = '';

                if(usuarios.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-500">Nenhum usuário encontrado.</td></tr>`;
                    return;
                }

                usuarios.forEach(user => {
                    // Esconde o botão de excluir se o logado for apenas um funcionário/nutri
                    const botaoExcluir = (role === 'ROLE_ADMIN' || role === 'ROLE_GERENTE')
                        ? `<button onclick="deletarUsuario(${user.id})" class="text-red-500 hover:text-red-400 font-medium hover:underline transition">Excluir</button>`
                        : `<span class="text-gray-600 text-sm">Sem permissão</span>`;

                    tbody.innerHTML += `
                            <tr class="border-b border-gray-800/50 hover:bg-gray-800/40 transition">
                                <td class="p-4 text-white font-medium">${user.nome}</td>
                                <td class="p-4 text-gray-400">${user.email}</td>
                                <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${getColorRole(user.role)}">${user.role.replace('ROLE_', '')}</span></td>
                                <td class="p-4 text-center">
                                <a href="editarusuario.html?id=${user.id}" class="text-blue-400 hover:text-blue-300 font-medium hover:underline transition mr-4">Editar</a>
                                ${botaoExcluir}
                                </td>
                            </tr>
                        `;
                });
            } else {
                console.error("Erro na resposta:", response.status);
                alert('Erro 403: Verifique se o seu usuário tem permissão para acessar esta lista.');
            }
        } catch (error) {
            console.error('Erro na requisição:', error);
            alert('Falha de conexão. O servidor Spring Boot está rodando?');
        }
    }

    // Função para deletar usuário
    async function deletarUsuario(id) {
        if(!confirm('Tem certeza que deseja excluir este usuário? Esta ação é irreversível.')) return;

        const token = localStorage.getItem('token');
        const response = await fetch(`http://localhost:8080/usuarios/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            alert('Usuário excluído com sucesso!');
            carregarUsuarios(); // Recarrega a tabela
        } else {
            alert('Erro ao excluir usuário. Verifique suas permissões.');
        }
    }

    // Define as cores das tags baseadas na Role
    function getColorRole(role) {
        if (role === 'ROLE_ADMIN') return 'bg-red-500/20 text-red-400 border border-red-500/30';
        if (role === 'ROLE_GERENTE') return 'bg-orange-500/20 text-orange-400 border border-orange-500/30';
        if (role === 'ROLE_FUNCIONARIO') return 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
        return 'bg-green-500/20 text-green-400 border border-green-500/30';
    }

    // Inicia a listagem ao carregar a página
    carregarUsuarios();
</script>
</body>
</html>
