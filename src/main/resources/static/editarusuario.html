<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Editar Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col">

<header class="bg-gray-900 border-b-4 border-blue-600 sticky top-0 z-50 p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="img/logoavaliafit.png" alt="Avalia FIT Logo" class="w-28 h-auto grayscale brightness-200">
            <span class="bg-blue-600/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide border border-blue-600/30">
                Edição
            </span>
        </div>
        <nav class="hidden md:flex items-center gap-6 text-gray-300">
            <a href="listarusuarios.html" class="hover:text-white transition font-medium text-sm">&larr; Voltar para a Lista</a>
            <a href="#" id="btnSair" class="text-red-400 hover:text-red-300 transition font-medium text-sm ml-4">Sair do Painel</a>
        </nav>
    </div>
</header>

<main class="flex-grow p-6 md:p-12 flex justify-center items-start">
    <div class="w-full max-w-3xl bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">

        <div class="mb-8 pb-4 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-white">Editar Usuário</h1>
            <p class="text-gray-400 mt-1">Atualize os dados necessários abaixo.</p>
        </div>

        <form id="editarForm" class="space-y-6">

            <h3 class="text-lg font-semibold text-white border-l-4 border-blue-500 pl-3">Dados Pessoais</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-950/50 p-4 rounded-xl border border-gray-800">

                <div class="md:col-span-2">
                    <label for="nome" class="block text-gray-400 font-medium mb-2 text-sm">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required
                           class="w-full px-4 py-2.5 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label for="cpf" class="block text-gray-400 font-medium mb-2 text-sm">CPF</label>
                    <input type="text" id="cpf" name="cpf" required
                           class="w-full px-4 py-2.5 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label for="telefone" class="block text-gray-400 font-medium mb-2 text-sm">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" name="telefone" required
                           class="w-full px-4 py-2.5 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
            </div>

            <h3 class="text-lg font-semibold text-white border-l-4 border-blue-500 pl-3 mt-8">Acesso ao Sistema</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-950/50 p-4 rounded-xl border border-gray-800">

                <div>
                    <label for="email" class="block text-gray-400 font-medium mb-2 text-sm">E-mail de Acesso</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2.5 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label for="senha" class="block text-gray-400 font-medium mb-2 text-sm">Nova Senha (opcional)</label>
                    <input type="password" id="senha" name="senha" placeholder="Deixe em branco para não alterar"
                           class="w-full px-4 py-2.5 bg-gray-800 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
            </div>

            <div class="pt-6 flex justify-end gap-4">
                <a href="listarusuarios.html"
                   class="px-6 py-2.5 bg-transparent border border-gray-700 text-gray-400 rounded-lg hover:bg-gray-800 transition">
                    Cancelar
                </a>
                <button type="submit"
                        class="px-8 py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg shadow-blue-600/20">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</main>

<script type="module">
    import { CONFIG } from './js/config.js';
    import { StorageManager } from './js/storage-manager.js';
    import { apiClient } from './js/api-client.js';

    // 1. Defesa de Rota
    StorageManager.requireAuth();

    // 2. Logout
    document.getElementById('btnSair').addEventListener('click', (e) => {
        e.preventDefault();
        StorageManager.logout();
    });

    // 3. Parâmetro de ID na URL
    const urlParams = new URLSearchParams(window.location.search);
    const userId    = urlParams.get('id');

    if (!userId) {
        alert('Nenhum usuário selecionado para edição.');
        window.location.href = 'listarusuarios.html';
    }

    // 4. Pré-preencher com dados atuais do usuário
    async function carregarDados() {
        try {
            const usuario = await apiClient.get(`${CONFIG.ENDPOINTS.USUARIOS}/${userId}`);
            document.getElementById('nome').value     = usuario.nome;
            document.getElementById('cpf').value      = usuario.cpf;
            document.getElementById('telefone').value = usuario.telefone;
            document.getElementById('email').value    = usuario.email;
        } catch (error) {
            console.error('Erro ao buscar dados do usuário:', error);
            alert('Erro ao buscar dados do usuário.');
        }
    }

    // 5. Salvar alterações via PUT
    document.getElementById('editarForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = {
            nome:     document.getElementById('nome').value,
            cpf:      document.getElementById('cpf').value,
            telefone: document.getElementById('telefone').value,
            email:    document.getElementById('email').value,
            senha:    document.getElementById('senha').value || null
        };

        try {
            await apiClient.put(`${CONFIG.ENDPOINTS.USUARIOS}/${userId}`, formData);
            alert('Usuário atualizado com sucesso!');
            window.location.href = 'listarusuarios.html';
        } catch (error) {
            console.error('Erro ao atualizar usuário:', error);
            alert('Erro: ' + (error.message || 'Falha na atualização.'));
        }
    });

    carregarDados();
</script>
</body>
</html>
